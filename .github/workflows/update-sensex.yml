name: Update Sensex Futures

on:
  schedule:
    - cron: "*/5 3-11 * * 1-5"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run updater
        run: node scripts/updateSensex.js

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/sensex-ticks.json

          git diff --cached --quiet || git commit -m "Auto update Sensex ticks"

          git push
